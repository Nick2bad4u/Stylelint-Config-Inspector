on:
    push:
        branches:
            - main

name: release-please

permissions:
    contents: read
    id-token: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            releases_created: ${{ steps.release.outputs.releases_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            html_url: ${{ steps.release.outputs.html_url }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
              id: release
              with:
                  token: ${{ secrets.WORKFLOW_PUSH_BOT_TOKEN }}
    publish-npm:
        runs-on: ubuntu-latest
        needs: release-please
        if: ${{ needs.release-please.outputs.releases_created == 'true' }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: lts/*
                  registry-url: https://registry.npmjs.org
                  cache: npm
            # npm 11.5.1 or later is required so update to latest to be sure
            - run: npm install -g npm@latest
            - run: npm ci
            - run: npm publish --provenance --access public
    notify-twitter:
        runs-on: ubuntu-latest
        needs:
            - release-please
            - publish-npm
        if: ${{ needs.release-please.outputs.releases_created == 'true' }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - run: 'npx @humanwhocodes/tweet "@eslint/config-inspector ${{ needs.release-please.outputs.tag_name }} has been released: ${{ needs.release-please.outputs.html_url }}"'
              env:
                  TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
                  TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
                  TWITTER_ACCESS_TOKEN_KEY: ${{ secrets.TWITTER_ACCESS_TOKEN_KEY }}
                  TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
    notify-mastodon:
        runs-on: ubuntu-latest
        needs:
            - release-please
            - publish-npm
        if: ${{ needs.release-please.outputs.releases_created == 'true' }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - run: 'npx @humanwhocodes/toot "@eslint/config-inspector ${{ needs.release-please.outputs.tag_name }} has been released: ${{ needs.release-please.outputs.html_url }}"'
              env:
                  MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
                  MASTODON_HOST: ${{ secrets.MASTODON_HOST }}
